# ZedUploader reverse proxy — ready for certbot.
#
# 1) Point `server_name` at your domain.
# 2) Obtain a certificate:  sudo certbot --nginx -d your.domain
#    certbot will add the SSL directives / 443 server block automatically.

upstream zeduploader_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    # Allow Let's Encrypt HTTP-01 challenges.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 25m;

    location / {
        proxy_pass http://zeduploader_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
